input AddInvoicePaymentsInput {
  budgetLineId: Float!
  quantity: Float!
  unitPrice: Float!
}

type BudgetCategoriesItem {
  color: String!
  id: Int!
  name: String!
}

type BudgetLinesItem {
  budgetCategoryId: Int!
  category: BudgetCategoriesItem
  description: String
  editionId: Int!
  estimatedQuantity: Float!
  estimatedUnitPrice: String!
  helloAssoProductId: Int
  id: Int!
  lineType: LineType!
  name: String!
  realCost: Int
  salesCount: Int
}

type EditionsItem {
  active: Boolean!
  id: Int!
  name: String!
  startDate: String!
  totalExpense: Float!
  totalIncome: Float!
  totalPrevisionnalExpense: Float!
  totalPrevisionnalIncome: Float!
}

type GetBudgetStatsByCategories {
  categoryName: String!
  total: Float!
  totalEstimated: Float!
}

type HelloAssoConfigItem {
  editionId: Int!
  formSlug: String!
  id: Int!
}

enum InvoiceStatus {
  CANCELLED
  PAID
  PENDING
}

type InvoicesItem {
  author: UserItem
  authorId: String!
  editionId: Int!
  executedAt: String
  id: Int!
  name: String!
  note: String
  payments: [PaymentsItem!]!
  status: InvoicesStatusEnum!
  totalAmount: String!
  vendor: VendorsItem
  vendorId: Int!
}

enum InvoicesStatusEnum {
  CANCELLED
  PAID
  PENDING
}

enum LineType {
  expense
  income
}

type Mutation {
  addBudgetCategory(color: String!, name: String!): BudgetCategoriesItem
  addBudgetLine(budgetCategoryId: Float!, description: String, editionId: Float!, estimatedQuantity: Int!, estimatedUnitPrice: Float!, lineType: LineType!, name: String!): BudgetLinesItem
  addEdition(active: Boolean, name: String!, startDate: String!): EditionsItem
  addHelloAssoConfig(editionId: Float!, formSlug: String!, importProductFromHelloAsso: Boolean): HelloAssoConfigItem
  addInvoice(authorId: ID!, editionId: Float!, name: String!, note: String, payments: [AddInvoicePaymentsInput!]!, status: InvoiceStatus!, totalAmount: Float!, vendorId: Float!): InvoicesItem
  addOrUpdateVendor(address: String, description: String, email: String, id: Float, name: String!, phone: String): VendorsItem
  deleteBudgetCategory(id: Float!): BudgetCategoriesItem
  deleteBudgetLine(id: Float!): BudgetLinesItem
  deleteEdition(id: Float!): EditionsItem
  deleteInvoice(id: Float!): InvoicesItem
  deleteVendor(id: Float!): VendorsItem
  updateBudgetCategory(id: Float!, name: String!): BudgetCategoriesItem
  updateBudgetLine(budgetCategoryId: Float, description: String, editionId: Float, estimatedQuantity: Int, estimatedUnitPrice: Float, helloAssoProductId: Float, id: Float!, lineType: LineType, name: String): BudgetLinesItem
  updateEdition(id: Float!, name: String, startDate: String): EditionsItem
  updateHelloAssoConfig(formSlug: String!, id: Float!): HelloAssoConfigItem
  updateInvoice(authorId: ID, editionId: Float!, id: Float!, name: String, note: String, payments: [UpdateInvoicePaymentsInput!], status: InvoiceStatus, totalAmount: Float, vendorId: Float): InvoicesItem
}

type PaymentsItem {
  budgetLineId: Int!
  editionId: Int!
  id: Int!
  invoiceId: Int!
  quantity: Float!
  unitPrice: String!
}

type Query {
  budgetCategories: [BudgetCategoriesItem!]!
  budgetLines(budgetLineType: LineType, editionId: Float!): [BudgetLinesItem!]!
  edition(id: Float!): EditionsItem
  editions: [EditionsItem!]!
  getBudgetStatsByCategories(editionId: Float!, lineType: LineType!): [GetBudgetStatsByCategories!]!
  helloAssoConfig(editionId: Float!): HelloAssoConfigItem
  invoices(editionId: Float!, status: InvoiceStatus): [InvoicesItem!]!
  vendors: [VendorsItem!]!
}

input UpdateInvoicePaymentsInput {
  budgetLineId: Float!
  id: Float
  quantity: Float!
  unitPrice: Float!
}

type UserItem {
  banExpires: String
  banReason: String
  banned: Boolean
  createdAt: String!
  displayUsername: String
  email: String!
  emailVerified: Boolean!
  id: String!
  image: String
  name: String!
  role: String
  updatedAt: String!
  username: String
}

type VendorsItem {
  address: String
  description: String
  email: String
  id: Int!
  name: String!
  phoneNumber: String
}