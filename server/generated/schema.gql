input AddInvoicePaymentsInput {
  budgetLineId: Float!
  quantity: Float!
  unitPrice: Float!
}

type BudgetCategoriesItem {
  color: String!
  id: Int!
  name: String!
}

type BudgetLinesItem {
  budgetCategoryId: Int!
  category: BudgetCategoriesItem
  description: String
  editionId: Int!
  estimatedQuantity: Float!
  estimatedUnitPrice: String!
  id: Int!
  lineType: LineType!
  name: String!
}

type EditionsItem {
  id: Int!
  name: String!
  startDate: String!
  totalExpense: Float!
  totalIncome: Float!
  totalPrevisionnalExpense: Float!
  totalPrevisionnalIncome: Float!
}

type GetBudgetStatsByCategories {
  categoryName: String!
  total: Float!
  totalEstimated: Float!
}

enum InvoiceStatus {
  CANCELLED
  PAID
  PENDING
}

enum InvoiceStatusEnum {
  cancelled
  paid
  pending
}

type InvoicesItem {
  authorId: Int!
  editionId: Int!
  executedAt: String
  id: Int!
  note: String
  status: InvoiceStatus!
  totalAmount: String!
  vendorId: Int!
}

enum LineType {
  EXPENSE
  INCOME
}

enum LineTypeEnum {
  expense
  income
}

type Mutation {
  addBudgetCategory(color: String!, name: String!): BudgetCategoriesItem
  addBudgetLine(budgetCategoryId: Float!, description: String, editionId: Float!, estimatedQuantity: Int!, estimatedUnitPrice: Float!, lineType: LineTypeEnum!, name: String!): BudgetLinesItem
  addEdition(name: String!, startDate: String!): EditionsItem
  addInvoice(authorId: Float!, editionId: Float!, note: String, payments: [AddInvoicePaymentsInput!]!, status: InvoiceStatusEnum!, totalAmount: Float!, vendorId: Float!): InvoicesItem
  addOrUpdateVendor(address: String, description: String, email: String, id: Float, name: String!, phone: String): VendorsItem
  deleteBudgetCategory(id: Float!): BudgetCategoriesItem
  deleteBudgetLine(id: Float!): BudgetLinesItem
  deleteEdition(id: Float!): EditionsItem
  deleteInvoice(id: Float!): InvoicesItem
  deleteVendor(id: Float!): VendorsItem
  updateBudgetCategory(id: Float!, name: String!): BudgetCategoriesItem
  updateBudgetLine(budgetCategoryId: Float, description: String, editionId: Float, estimatedQuantity: Int, estimatedUnitPrice: Float, id: Float!, lineType: LineTypeEnum, name: String): BudgetLinesItem
  updateEdition(id: Float!, name: String, startDate: String): EditionsItem
}

type Query {
  budgetCategories: [BudgetCategoriesItem!]!
  budgetLines(budgetLineType: LineTypeEnum, editionId: Float!): [BudgetLinesItem!]!
  editions: [EditionsItem!]!
  getBudgetStatsByCategories(editionId: Float!, lineType: LineTypeEnum!): [GetBudgetStatsByCategories!]!
  invoices(editionId: Float!, status: InvoiceStatusEnum): [InvoicesItem!]!
  vendors: [VendorsItem!]!
}

type VendorsItem {
  address: String
  description: String
  email: String
  id: Int!
  name: String!
  phoneNumber: String
}