query getInvoices($editionId: Float!, $status: InvoiceStatusEnum) {
  invoices(editionId: $editionId, status: $status) {
    id
    vendorId
    vendor {
      id
      name
    }
    totalAmount
    note
    author {
      id
    }
    executedAt
    status
    payments {
      id
      budgetLineId
      quantity
      unitPrice
    }
  }
}
