mutation addInvoice(
  $authorId: Float!
  $editionId: Float!
  $note: String
  $payments: [AddInvoicePaymentsInput!]!
  $status: InvoiceStatusEnum!
  $totalAmount: Float!
  $vendorId: Float!
) {
  addInvoice(
    editionId: $editionId
    note: $note
    payments: $payments
    status: $status
    totalAmount: $totalAmount
    vendorId: $vendorId
    authorId: $authorId
  ) {
    id
  }
}
