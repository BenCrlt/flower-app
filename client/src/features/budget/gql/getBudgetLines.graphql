query getBudgetLines($editionId: Float!, $budgetLineType: LineTypeEnum!) {
  budgetLines(editionId: $editionId, budgetLineType: $budgetLineType) {
    id
    name
    description
    estimatedQuantity
    estimatedUnitPrice
    realCost
    salesCount
    lineType
    category {
      id
      name
      color
    }
  }
}
